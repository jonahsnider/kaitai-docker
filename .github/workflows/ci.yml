name: CI

on:
  push:
  pull_request:

jobs:
  build:
    strategy:
      matrix:
        kaitai-version:
          - "0.11"
          - "0.10"
          - "0.9"
          - "0.8"
          - "0.7"
          - "0.6"
          - "0.5"
          - "0.4"
          - "0.3"
          - "0.2"

    name: Build and test Docker image (v${{ matrix.kaitai-version }})

    runs-on: ubuntu-latest

    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build
        uses: docker/build-push-action@v6
        with:
          push: false
          load: true
          tags: kaitai-struct-compiler:${{ matrix.kaitai-version }}
          file: ./${{ matrix.kaitai-version }}.Dockerfile
      - name: Test
        run: docker run --rm kaitai-struct-compiler:${{ matrix.kaitai-version }} --version
